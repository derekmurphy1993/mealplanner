name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  client-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build client
        run: npm run build

  api-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Check API syntax
        run: |
          node --check api/index.js
          node --check api/controllers/auth.controller.js
          node --check api/controllers/meal.controller.js
          node --check api/controllers/planner.controller.js
